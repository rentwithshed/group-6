<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Group 6 Data Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    :root {
      --bg: #0f0e0c;
      --surface: #1a1816;
      --surface-raised: #221f1c;
      --border: #2e2a25;
      --border-light: #3d3731;
      --text: #e8e0d4;
      --text-muted: #8a8078;
      --text-dim: #5c554d;
      --amber: #e89b4e;
      --amber-dim: #c47a2e;
      --amber-glow: rgba(232, 155, 78, 0.12);
      --red: #d45757;
      --red-dim: rgba(212, 87, 87, 0.15);
      --green: #6abf7b;
      --green-dim: rgba(106, 191, 123, 0.15);
      --blue: #5b9bd5;
      --blue-dim: rgba(91, 155, 213, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* --- HEADER --- */
    header {
      margin-bottom: 48px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-family: 'Instrument Serif', serif;
      font-weight: 400;
      font-size: 36px;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 6px;
    }

    header h1 span {
      color: var(--amber);
      font-style: italic;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px rgba(106, 191, 123, 0.5);
      animation: pulse 2.5s ease-in-out infinite;
    }

    .status-dot.offline {
      background: var(--red);
      box-shadow: 0 0 8px rgba(212, 87, 87, 0.5);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.3px;
    }

    /* --- LIVE CARDS --- */
    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
    }

    .card.temp::before { background: var(--amber); }
    .card.ph::before { background: var(--green); }
    .card.heater::before { background: var(--red); }
    .card.pump::before { background: var(--blue); }

    .card-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      margin-bottom: 10px;
      font-weight: 500;
    }

    .card-value {
      font-family: 'DM Mono', monospace;
      font-size: 32px;
      font-weight: 500;
      line-height: 1;
    }

    .card.temp .card-value { color: var(--amber); }
    .card.ph .card-value { color: var(--green); }
    .card.heater .card-value { color: var(--text); font-size: 20px; }
    .card.pump .card-value { color: var(--blue); font-size: 20px; }

    .card-sub {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 8px;
    }

    .heater-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .heater-badge.on {
      background: var(--red-dim);
      color: var(--red);
    }

    .heater-badge.off {
      background: var(--green-dim);
      color: var(--green);
    }

    .pump-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }

    .pump-badge.on {
      background: var(--blue-dim);
      color: var(--blue);
    }

    .pump-badge.off {
      background: var(--green-dim);
      color: var(--green);
    }

    .chart-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .chart-title {
      font-family: 'Instrument Serif', serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--text);
    }

    .time-controls {
      display: flex;
      gap: 4px;
      background: var(--bg);
      border-radius: 6px;
      padding: 3px;
    }

    .time-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .time-btn:hover { color: var(--text-muted); }

    .time-btn.active {
      background: var(--surface-raised);
      color: var(--amber);
    }

    .chart-container {
      position: relative;
      height: 320px;
    }

    .table-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .table-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
    }

    .table-title {
      font-family: 'Instrument Serif', serif;
      font-size: 20px;
      font-weight: 400;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      text-align: left;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      font-weight: 500;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
    }

    tbody td {
      padding: 10px 24px;
      font-size: 12px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    tbody tr:last-child td { border-bottom: none; }

    tbody tr:hover { background: var(--surface-raised); }

    td.temp-cell {
      color: var(--amber);
      font-weight: 500;
    }

    .loading {
      text-align: center;
      padding: 60px 0;
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 1px;
    }

    .loading::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }

    .error-msg {
      text-align: center;
      padding: 40px;
      color: var(--red);
      font-size: 12px;
    }

    td.ph-cell {
      color: var(--green);
      font-weight: 500;
    }

    /* --- RESPONSIVE --- */
    @media (max-width: 720px) {
      .cards { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .cards { grid-template-columns: 1fr; }
      .chart-header { flex-direction: column; gap: 12px; align-items: flex-start; }
      header h1 { font-size: 28px; }
      .container { padding: 24px 16px 60px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <h1>Group 6</h1>
      <div class="subtitle">Live Dashboard</div>
      <div class="status-row">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">Connecting...</span>
      </div>
    </header>

    <div class="cards">
      <div class="card temp">
        <div class="card-label">Temperature</div>
        <div class="card-value" id="liveTemp">—</div>
        <div class="card-sub" id="tempRange">Target: 24.0 – 26.0 °C</div>
      </div>
      <div class="card ph">
        <div class="card-label">pH</div>
        <div class="card-value" id="livePh">—</div>
      </div>
      <div class="card heater">
        <div class="card-label">Heater</div>
        <div class="card-value"><span class="heater-badge off" id="heaterBadge">—</span></div>
      </div>
      <div class="card pump">
        <div class="card-label">Air Pump</div>
        <div class="card-value"><span class="pump-badge" id="pumpBadge">—</span></div>
      </div>
    </div>

    <div class="chart-section">
      <div class="chart-header">
        <div class="chart-title">Temperature History</div>
        <div class="time-controls">
          <button class="time-btn" data-hours="6">6h</button>
          <button class="time-btn active" data-hours="24">24h</button>
          <button class="time-btn" data-hours="72">3d</button>
          <button class="time-btn" data-hours="168">7d</button>
          <button class="time-btn" data-hours="336">14d</button>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="tempChart"></canvas>
      </div>
    </div>

    <div class="chart-section">
      <div class="chart-header">
        <div class="chart-title">pH History</div>
        <div class="time-controls" id="phTimeControls">
          <button class="time-btn ph-btn" data-hours="6">6h</button>
          <button class="time-btn ph-btn active" data-hours="24">24h</button>
          <button class="time-btn ph-btn" data-hours="72">3d</button>
          <button class="time-btn ph-btn" data-hours="168">7d</button>
          <button class="time-btn ph-btn" data-hours="336">14d</button>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="phChart"></canvas>
      </div>
    </div>

    <div class="table-section" style="margin-bottom: 24px;">
      <div class="table-header">
        <div class="table-title">Recent Temperature Readings</div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Temp</th>
            <th>Heater</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="3" class="loading">Fetching data</td></tr>
        </tbody>
      </table>
    </div>

    <div class="table-section">
      <div class="table-header">
        <div class="table-title">Recent pH Readings</div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>pH</th>
          </tr>
        </thead>
        <tbody id="phTableBody">
          <tr><td colspan="2" style="padding:10px 24px;color:var(--text-dim);font-size:12px;">Sensor not yet connected</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <script>

    const SUPABASE_URL = 'https://dsplganzkgpskyfmgydg.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_vZYwz56H2RTMv0coUJgkeQ_Pv9KeaE_';

    let chart = null;
    let phChart = null;
    let currentHours = 24;
    let currentPhHours = 24;
    let allData = [];
    let allPhData = [];

    async function fetchData(hours) {
      const since = new Date(Date.now() - hours * 60 * 60 * 1000).toISOString();
      const url = `${SUPABASE_URL}/rest/v1/temperature_logs?created_at=gte.${since}&order=created_at.asc&limit=5000`;

      const res = await fetch(url, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        }
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    async function fetchPhData(hours) {
      const since = new Date(Date.now() - hours * 60 * 60 * 1000).toISOString();
      const url = `${SUPABASE_URL}/rest/v1/ph_logs?created_at=gte.${since}&order=created_at.asc&limit=5000`;

      const res = await fetch(url, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        }
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    function updateCards(data) {
      const dot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      const liveTemp = document.getElementById('liveTemp');
      const heaterBadge = document.getElementById('heaterBadge');
      const pumpBadge = document.getElementById('pumpBadge');

      if (!data.length) {
        dot.classList.add('offline');
        statusText.textContent = 'No data received';
        liveTemp.textContent = '—';
        heaterBadge.textContent = '—';
        pumpBadge.textContent = '—';
        return;
      }

      const latest = data[data.length - 1];
      const age = Date.now() - new Date(latest.created_at).getTime();
      const isStale = age > 20 * 60 * 1000; // 20 min = stale

      dot.classList.toggle('offline', isStale);
      const ago = Math.round(age / 60000);
      statusText.textContent = isStale
        ? `Last reading ${ago}m ago — check ESP32`
        : `Live · updated ${ago}m ago`;

      liveTemp.textContent = `${latest.temp_c.toFixed(1)}°C`;

      heaterBadge.textContent = latest.heater_on ? 'ON' : 'OFF';
      heaterBadge.className = `heater-badge ${latest.heater_on ? 'on' : 'off'}`;

      const pumpOn = (latest.pump_speed || 34) > 0;
      pumpBadge.textContent = pumpOn ? 'ON' : 'OFF';
      pumpBadge.className = `pump-badge ${pumpOn ? 'on' : 'off'}`;
    }

    function updatePhCard(data) {
      const el = document.getElementById('livePh');
      if (!data.length) {
        el.textContent = '—';
        return;
      }
      const latest = data[data.length - 1];
      el.textContent = latest.ph_value != null ? latest.ph_value.toFixed(2) : '—';
    }

    function renderChart(data) {
      const ctx = document.getElementById('tempChart').getContext('2d');

      const labels = data.map(d => new Date(d.created_at));
      const temps = data.map(d => d.temp_c);

      const heaterAnnotations = [];
      let segStart = null;
      data.forEach((d, i) => {
        if (d.heater_on && !segStart) segStart = i;
        if (!d.heater_on && segStart !== null) {
          heaterAnnotations.push({ start: segStart, end: i });
          segStart = null;
        }
      });
      if (segStart !== null) heaterAnnotations.push({ start: segStart, end: data.length - 1 });

      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'Temperature (°C)',
            data: temps,
            borderColor: '#e89b4e',
            backgroundColor: 'rgba(232, 155, 78, 0.08)',
            borderWidth: 1.5,
            pointRadius: 0,
            pointHoverRadius: 4,
            pointHoverBackgroundColor: '#e89b4e',
            fill: true,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            intersect: false,
            mode: 'index'
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1a1816',
              borderColor: '#2e2a25',
              borderWidth: 1,
              titleFont: { family: 'DM Mono', size: 11 },
              bodyFont: { family: 'DM Mono', size: 12 },
              titleColor: '#8a8078',
              bodyColor: '#e89b4e',
              padding: 10,
              displayColors: false,
              callbacks: {
                title: (items) => {
                  const d = new Date(items[0].parsed.x);
                  return d.toLocaleString('en-CA', {
                    month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                  });
                },
                label: (item) => `${item.parsed.y.toFixed(2)} °C`
              }
            }
          },
          scales: {
            x: {
              type: 'time',
              time: {
                tooltipFormat: 'PPp',
                displayFormats: {
                  hour: 'HH:mm',
                  day: 'MMM d'
                }
              },
              grid: { color: 'rgba(46,42,37,0.5)', drawBorder: false },
              ticks: {
                font: { family: 'DM Mono', size: 10 },
                color: '#5c554d',
                maxTicksLimit: 8
              }
            },
            y: {
              min: 20,
              max: 32,
              grid: { color: 'rgba(46,42,37,0.5)', drawBorder: false },
              ticks: {
                font: { family: 'DM Mono', size: 10 },
                color: '#5c554d',
                callback: v => v + '°'
              }
            }
          }
        },
        plugins: [{
          id: 'targetBand',
          beforeDraw(chart) {
            const { ctx, chartArea, scales } = chart;
            const yMin = scales.y.getPixelForValue(24);
            const yMax = scales.y.getPixelForValue(26);
            ctx.save();
            ctx.fillStyle = 'rgba(106, 191, 123, 0.06)';
            ctx.fillRect(chartArea.left, yMax, chartArea.width, yMin - yMax);

            ctx.strokeStyle = 'rgba(106, 191, 123, 0.2)';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            [yMin, yMax].forEach(y => {
              ctx.beginPath();
              ctx.moveTo(chartArea.left, y);
              ctx.lineTo(chartArea.right, y);
              ctx.stroke();
            });
            ctx.restore();
          }
        }]
      });
    }

    function renderPhChart(data) {
      const ctx = document.getElementById('phChart').getContext('2d');

      if (phChart) phChart.destroy();

      if (!data.length) {
        phChart = new Chart(ctx, {
          type: 'line',
          data: { labels: [], datasets: [{ label: 'pH', data: [] }] },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: { enabled: false }
            },
            scales: {
              x: { display: false },
              y: { display: false }
            }
          },
          plugins: [{
            id: 'noDataMsg',
            afterDraw(chart) {
              const { ctx, chartArea } = chart;
              ctx.save();
              ctx.textAlign = 'center';
              ctx.fillStyle = '#5c554d';
              ctx.font = "13px 'DM Mono', monospace";
              ctx.fillText('pH sensor not yet connected', (chartArea.left + chartArea.right) / 2, (chartArea.top + chartArea.bottom) / 2);
              ctx.restore();
            }
          }]
        });
        return;
      }

      const labels = data.map(d => new Date(d.created_at));
      const values = data.map(d => d.ph_value);

      phChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'pH',
            data: values,
            borderColor: '#6abf7b',
            backgroundColor: 'rgba(106, 191, 123, 0.08)',
            borderWidth: 1.5,
            pointRadius: 0,
            pointHoverRadius: 4,
            pointHoverBackgroundColor: '#6abf7b',
            fill: true,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { intersect: false, mode: 'index' },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1a1816',
              borderColor: '#2e2a25',
              borderWidth: 1,
              titleFont: { family: 'DM Mono', size: 11 },
              bodyFont: { family: 'DM Mono', size: 12 },
              titleColor: '#8a8078',
              bodyColor: '#6abf7b',
              padding: 10,
              displayColors: false,
              callbacks: {
                title: (items) => {
                  const d = new Date(items[0].parsed.x);
                  return d.toLocaleString('en-CA', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                },
                label: (item) => `pH ${item.parsed.y.toFixed(2)}`
              }
            }
          },
          scales: {
            x: {
              type: 'time',
              time: {
                tooltipFormat: 'PPp',
                displayFormats: { hour: 'HH:mm', day: 'MMM d' }
              },
              grid: { color: 'rgba(46,42,37,0.5)', drawBorder: false },
              ticks: { font: { family: 'DM Mono', size: 10 }, color: '#5c554d', maxTicksLimit: 8 }
            },
            y: {
              min: 2,
              max: 8,
              grid: { color: 'rgba(46,42,37,0.5)', drawBorder: false },
              ticks: {
                font: { family: 'DM Mono', size: 10 },
                color: '#5c554d',
                callback: v => `pH ${v}`
              }
            }
          }
        },
      });
    }

    function renderPhTable(data) {
      const tbody = document.getElementById('phTableBody');
      const recent = data.slice(-20).reverse();

      if (!recent.length) {
        tbody.innerHTML = '<tr><td colspan="2" style="padding:10px 24px;color:var(--text-dim);font-size:12px;">Sensor not yet connected</td></tr>';
        return;
      }

      tbody.innerHTML = recent.map(d => {
        const t = new Date(d.created_at);
        const time = t.toLocaleString('en-CA', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        return `<tr>
          <td>${time}</td>
          <td class="ph-cell">${d.ph_value != null ? d.ph_value.toFixed(2) : '—'}</td>
        </tr>`;
      }).join('');
    }

    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      const recent = data.slice(-20).reverse();

      if (!recent.length) {
        tbody.innerHTML = '<tr><td colspan="3" class="error-msg">No readings yet</td></tr>';
        return;
      }

      tbody.innerHTML = recent.map(d => {
        const t = new Date(d.created_at);
        const time = t.toLocaleString('en-CA', {
          month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
        const heater = d.heater_on
          ? '<span style="color:var(--red)">ON</span>'
          : '<span style="color:var(--green)">OFF</span>';
        return `<tr>
          <td>${time}</td>
          <td class="temp-cell">${d.temp_c.toFixed(2)} °C</td>
          <td>${heater}</td>
        </tr>`;
      }).join('');
    }

    async function refresh() {
      try {
        allData = await fetchData(currentHours);
        updateCards(allData);
        renderChart(allData);
        renderTable(allData);
      } catch (err) {
        console.error('Temp fetch error:', err);
        document.getElementById('statusDot').classList.add('offline');
        document.getElementById('statusText').textContent = 'Connection error';
      }
    }

    async function refreshPh() {
      try {
        allPhData = await fetchPhData(currentPhHours);
        updatePhCard(allPhData);
        renderPhChart(allPhData);
        renderPhTable(allPhData);
      } catch (err) {
        // pH sensor not yet connected — fail silently, render empty state
        updatePhCard([]);
        renderPhChart([]);
        renderPhTable([]);
      }
    }

    // Temp chart time controls
    document.querySelectorAll('.time-btn:not(.ph-btn)').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.time-btn:not(.ph-btn)').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentHours = parseInt(btn.dataset.hours);
        refresh();
      });
    });

    // pH chart time controls
    document.querySelectorAll('.ph-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.ph-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentPhHours = parseInt(btn.dataset.hours);
        refreshPh();
      });
    });

    refresh();
    refreshPh();
    setInterval(refresh, 5 * 60 * 1000);
    setInterval(refreshPh, 5 * 60 * 1000);
  </script>
</body>
</html>
